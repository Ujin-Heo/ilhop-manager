openapi: '3.0.3'
info:
  title: Template API - OpenAPI 3.0
  description: |- 
    This is a Template Server based on the OpenAPI 3.0 specification.
  version: '1.0'
servers:
  - url: https://api.server.test/v1
tags:
  - name: example
    description: 예시 tag입니다.
paths:
  /example:
      post: # get/post/put/delete 중 하나
        tags:
          - example
        summary: 예시 endpoint입니다.
        description: Example이라는 object를 불러옵니다.
        operationId: getExample
        parameters:
          - name: path_param
            in: path
            description: 예시 description입니다.
            required: true
            schema:
              type: string
          - name: query_param
            in: query
            description: 예시 description입니다.
            required: false
            explode: true
            schema:
              type: string
              default: option_a
              enum:
                - option_a
                - option_b
                - option_c
          - name: query_param2
            in: query
            description: 예시 description입니다.
            required: true
            explode: true
            schema:
              type: array
              items:
                type: string
        requestBody:
          description: 예시 description입니다.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Example'
        responses:
          '200':
            description: OK
            content:
              application/json:
                schema:
                  type: array
                  items:
                    $ref: "#/components/schemas/Example"
          '400':
            description: Bad request
          '404':
            description: Not found in the system
          default:
            description: Unexpected error
            content:
              application/json:
                schema:
                  $ref: "#/components/schemas/Error"
components:
  schemas:
    Example:
      type: object
      properties:
        id:
          type: integer
          format: int64
          example: 10
    Error:
      type: object
      properties:
        code:
          type: string
          example: "error code"
        message:
          type: string
      required:
        - code
        - message