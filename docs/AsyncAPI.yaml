asyncapi: 3.0.0
info:
  title: Ilhop Manager Real-time API
  version: 1.0.0
  description: "실시간 주문, 서빙 상태 및 결제 확인을 위한 WebSocket 규격"

channels:
  orderEvents:
    address: /ws/orders
    messages:
      orderCreated:
        $ref: '#/components/messages/OrderCreated'
      itemServedUpdated:
        $ref: '#/components/messages/ItemServedUpdated'
      paymentConfirmed:
        $ref: '#/components/messages/PaymentConfirmed'

  paymentStatus:
    address: '/ws/payment-status/{orderId}'
    parameters:
      orderId:
        description: "추적할 주문의 UUID"
    messages:
      paymentConfirmed:
        $ref: '#/components/messages/PaymentConfirmed'

operations:
  receiveEvents:
    action: receive
    channel:
      $ref: '#/channels/orderEvents'

  subscribePaymentStatus:
    action: receive
    channel:
      $ref: '#/channels/paymentStatus'

components:
  messages:
    OrderCreated:
      summary: "새로운 주문이 생성되었을 때 알림"
      payload:
        type: object
        properties:
          event: { type: string, const: "ORDER_CREATED" }
          data:
            $ref: './OpenAPI.yaml#/components/schemas/OrderDetail'

    ItemServedUpdated:
      summary: "특정 항목의 서빙 상태가 변경되었을 때 알림"
      payload:
        type: object
        properties:
          event: { type: string, const: "ITEM_SERVED_UPDATED" }
          data:
            type: object
            properties:
              orderId: { type: string, format: uuid }
              menuName: { type: string }
              isServed: { type: boolean }

    PaymentConfirmed:
      summary: "특정 주문의 입금 확인이 완료되었을 때 알림"
      payload:
        type: object
        properties:
          event: { type: string, const: "PAYMENT_CONFIRMED" }
          data:
            type: object
            properties:
              orderId: { type: string, format: uuid }
              isPaid: { type: boolean }